name: WebGL versioned Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_DIR: build/WebGL/WebGL

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: CSCI-526/main-assignment-a-cat-a-mouse-and-a-house
          token: ${{ secrets.PAT_CLASSIC }}
          ref: main

      - name: Ensure enough disk space
        shell: bash
        run: |
          set -euxo pipefail
          MIN_GB=35
          FREE_GB="$(df --output=avail -BG / | tail -1 | tr -dc '0-9')"
          echo "Free space on /: ${FREE_GB}G (need ${MIN_GB}G)"

          if [ "${FREE_GB}" -ge "${MIN_GB}" ]; then
            echo "Sufficient space — skipping cleanup"
          else
            echo "Not enough space — cleaning up"
            sudo rm -rf /usr/local/lib/android \
              /usr/share/dotnet \
              /usr/share/swift \
              /opt/ghc \
              /usr/local/.ghcup \
              /usr/local/julia* \
              /usr/local/graalvm \
              /usr/local/share/powershell \
              /usr/local/share/chromium \
              /opt/google/chrome \
              /opt/microsoft \
              /opt/az

            if [ -d /opt/hostedtoolcache ]; then
              sudo find /opt/hostedtoolcache -mindepth 1 -maxdepth 1 ! -name node -exec rm -rf {} +
            fi

            sudo apt-get clean
            sudo rm -rf /var/lib/apt/lists/*
            sudo rm -rf /var/cache/apt/archives/*
            docker system prune -af || true
            docker builder prune -af || true

            FREE_GB="$(df --output=avail -BG / | tail -1 | tr -dc '0-9')"
            echo "Free space after cleanup: ${FREE_GB}G"
            test "${FREE_GB}" -ge "${MIN_GB}"
          fi

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL

      - name: Prepare Pages output
        run: |
          set -euo pipefail
          SHA="$(git rev-parse --short HEAD)"
          test -d "$BUILD_DIR"
          mkdir -p out/builds/"$SHA" out/latest
          cp -r "$BUILD_DIR"/. out/builds/"$SHA"/
          cp -r "$BUILD_DIR"/. out/latest/
          # Root redirect so https://dw61.github.io/acat-game/ goes to /latest/
          cat > out/index.html <<'EOF'
          <!DOCTYPE html>
          <meta charset="utf-8">
          <title>Redirecting…</title>
          <link rel="canonical" href="latest/">
          <script>location.replace("latest/" + location.search + location.hash)</script>
          <meta http-equiv="refresh" content="0; url=latest/">
          EOF

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: out
          keep_files: true

      - name: Print deployed URLs
        run: |
          SHA="$(git rev-parse --short HEAD)"
          REPO="${GITHUB_REPOSITORY}"
          OWNER="${REPO%%/*}"
          REPONAME="${REPO##*/}"
          BASE="https://${OWNER}.github.io/${REPONAME}"
          echo ""
          echo "=========================================="
          echo "  Deployed URLs"
          echo "=========================================="
          echo "  Latest : ${BASE}/latest/"
          echo "  This build : ${BASE}/builds/${SHA}/"
          echo "  Root (redirect) : ${BASE}/"
          echo "=========================================="
