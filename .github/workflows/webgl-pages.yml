name: WebGL versioned Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  BUILD_DIR: build/WebGL

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: CSCI-526/main-assignment-a-cat-a-mouse-and-a-house
          token: ${{ secrets.PAT_CLASSIC }}
          ref: main

      - name: Free disk space (aggressive)
        shell: bash
        run: |
          set -euxo pipefail
          echo "Disk before cleanup"
          df -h

          sudo rm -rf /usr/local/lib/android \
            /usr/share/dotnet \
            /usr/share/swift \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/local/julia* \
            /usr/local/graalvm \
            /usr/local/share/powershell \
            /usr/local/share/chromium \
            /opt/google/chrome \
            /opt/microsoft \
            /opt/az

          # Keep Node for JavaScript-based actions; remove other toolcache payloads.
          if [ -d /opt/hostedtoolcache ]; then
            sudo find /opt/hostedtoolcache -mindepth 1 -maxdepth 1 ! -name node -exec rm -rf {} +
          fi

          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          sudo rm -rf /var/cache/apt/archives/*
          docker system prune -af || true
          docker builder prune -af || true

          echo "Disk after cleanup"
          df -h

      - name: Verify free space
        shell: bash
        run: |
          set -euo pipefail
          FREE_GB="$(df --output=avail -BG / | tail -1 | tr -dc '0-9')"
          echo "Free space on /: ${FREE_GB}G"
          test "${FREE_GB}" -ge 35

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL

      - name: Prepare Pages output
        run: |
          set -euo pipefail
          SHA="$(git rev-parse --short "$GITHUB_SHA")"
          test -d "$BUILD_DIR"
          mkdir -p out/builds/"$SHA" out/latest
          cp -r "$BUILD_DIR"/. out/builds/"$SHA"/
          cp -r "$BUILD_DIR"/. out/latest/

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: out
          keep_files: true
