name: WebGL versioned Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_DIR: build/WebGL/WebGL

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: CSCI-526/main-assignment-a-cat-a-mouse-and-a-house
          token: ${{ secrets.PAT_CLASSIC }}
          ref: main

      - name: Ensure enough disk space
        shell: bash
        run: |
          set -euxo pipefail
          MIN_GB=35
          FREE_GB="$(df --output=avail -BG / | tail -1 | tr -dc '0-9')"
          echo "Free space on /: ${FREE_GB}G (need ${MIN_GB}G)"

          if [ "${FREE_GB}" -ge "${MIN_GB}" ]; then
            echo "Sufficient space — skipping cleanup"
          else
            echo "Not enough space — cleaning up"
            sudo rm -rf /usr/local/lib/android \
              /usr/share/dotnet \
              /usr/share/swift \
              /opt/ghc \
              /usr/local/.ghcup \
              /usr/local/julia* \
              /usr/local/graalvm \
              /usr/local/share/powershell \
              /usr/local/share/chromium \
              /opt/google/chrome \
              /opt/microsoft \
              /opt/az

            if [ -d /opt/hostedtoolcache ]; then
              sudo find /opt/hostedtoolcache -mindepth 1 -maxdepth 1 ! -name node -exec rm -rf {} +
            fi

            sudo apt-get clean
            sudo rm -rf /var/lib/apt/lists/*
            sudo rm -rf /var/cache/apt/archives/*
            docker system prune -af || true
            docker builder prune -af || true

            FREE_GB="$(df --output=avail -BG / | tail -1 | tr -dc '0-9')"
            echo "Free space after cleanup: ${FREE_GB}G"
            test "${FREE_GB}" -ge "${MIN_GB}"
          fi

      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-WebGL-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-

      - uses: game-ci/unity-builder@v4
        env:
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: WebGL

      - name: Inject commit SHA into build
        run: |
          set -euo pipefail
          SHA="$(git rev-parse --short HEAD)"
          FULL_SHA="$(git rev-parse HEAD)"
          BUILD_DATE="$(date -u '+%Y-%m-%d %H:%M UTC')"
          UPSTREAM_REPO="CSCI-526/main-assignment-a-cat-a-mouse-and-a-house"
          SNIPPET="<div id='build-info' style='position:fixed;bottom:4px;right:8px;font:11px/1.4 monospace;color:rgba(255,255,255,0.5);z-index:9999;pointer-events:auto;user-select:all'><a href='https://github.com/${UPSTREAM_REPO}/commit/${FULL_SHA}' target='_blank' style='color:inherit;text-decoration:none'>${SHA}</a> · ${BUILD_DATE}</div>"
          sudo sed -i "s|</body>|${SNIPPET}</body>|" "$BUILD_DIR/index.html"

      - name: Prepare Pages output
        run: |
          set -euo pipefail
          SHA="$(git rev-parse --short HEAD)"
          test -d "$BUILD_DIR"
          mkdir -p out/"$SHA"
          cp -r "$BUILD_DIR"/. out/
          cp -r "$BUILD_DIR"/. out/"$SHA"/

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: out
          keep_files: true

      - name: Print deployed URLs
        run: |
          SHA="$(git rev-parse --short HEAD)"
          REPO="${GITHUB_REPOSITORY}"
          OWNER="${REPO%%/*}"
          REPONAME="${REPO##*/}"
          BASE="https://${OWNER}.github.io/${REPONAME}"
          echo ""
          echo "=========================================="
          echo "  Deployed URLs"
          echo "=========================================="
          echo "  Latest : ${BASE}/"
          echo "  Permalink : ${BASE}/${SHA}/"
          echo "=========================================="
